spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: true       
    repair-on-migrate: true  
    validate-on-migrate: false 

  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: ${PORT:8050}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
  cors:
    origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://frontskinsense-p95u-4ntbryqaw-guiza1.vercel.app}
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    max-file-size: 10MB
    allowed-types: image/jpeg,image/png,image/webp
