spring:
  application:
    name: beauty-center-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/beauty_center}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:gezgez}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  defer-datasource-initialization: false

  security:
    user:
      name: admin
      password: admin

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: ${SERVER_PORT:8050}
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-minimum-32-chars}
  expiration-minutes: ${JWT_EXP_MINUTES:60}
  refresh-expiration-days: ${JWT_REFRESH_EXP_DAYS:7}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
  show-actuator: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

notes:
  client-can-view: ${NOTES_CLIENT_CAN_VIEW:false}

logging:
  level:
    root: INFO
    beauty_center: DEBUG
    org.springframework.security: DEBUG

app:
  cors:
    origins: http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173,tauri://localhost,http://localhost:1420,http://127.0.0.1:1420,http://tauri.localhost,https://tauri.localhost,https://beauty-center-front-office-main.vercel.app
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    max-file-size: 10MB
    allowed-types: image/jpeg,image/png,image/webp