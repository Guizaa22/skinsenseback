<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Centre de Beauté & Soins</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --brand-primary: #A17969;
        --brand-primary-dark: #998675;
        --brand-primary-light: #CEAA9A;
        --brand-bg: #F5EDE8;
        --brand-bg-card: #FFFFFF;
        --brand-bg-input: #FDF8F5;
        --brand-text: #534741;
        --brand-text-muted: #998675;
        --brand-border: #E9DCD6;
        --brand-accent: #EBCDC4;
        --brand-heading-font: 'Cormorant Garamond', serif;
        --brand-body-font: 'Jost', sans-serif;
      }
      body {
        font-family: var(--brand-body-font);
        background-color: var(--brand-bg);
        color: var(--brand-text);
      }
      h1, h2, h3 {
        font-family: var(--brand-heading-font);
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#7e36e2",
              "primary-dark": "#5b24a8",
              "primary-light": "#f3e8ff",
              background: "#f7f6f8",
              surface: "#ffffff",
              text: "#141117",
              muted: "#726487",
            },
            fontFamily: {
              sans: ["Manrope", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: 'Manrope', sans-serif;
        background-color: #f7f6f8;
      }
      /* Hide scrollbar for clean UI */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>

</script>
